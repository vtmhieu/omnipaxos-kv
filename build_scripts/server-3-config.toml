location = "local-3"
server_id = 3
num_clients = 0 # Hardcoded number of client connections to wait for
listen_address = "127.0.0.1"
listen_port = 8003
output_filepath = "./logs/server-3.json"

[clock]
drift_per_sec = 2.0 # high = 1, medium 
uncertainty_us = 10 # high = 10, medium = 100, low = 1000
sync_interval_ms = 1 # high = 1, medium 10, low = 100
